<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MyChart — 自作トレーディングチャート</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
<!-- 線の設定モーダルはbody内に後で追加 -->
<style>
  :root {
    --bg:#0e1117; --panel:#161b24; --line:#232a36;
    --text:#d1d4dc; --muted:#787b86;
    --up:#26a69a; --down:#ef5350; --ema:#f5a623;
    --accent:#2962ff; --star:#f5c518;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { height:100%; }
  /* 画面の高さぴったりに合わせる。100dvh=スマホのアドレスバーを除いた実際の見える高さ */
  body { margin:0; height:100dvh; min-height:100dvh; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Hiragino Sans",sans-serif; overscroll-behavior:none;
    display:flex; flex-direction:column; overflow:hidden; }
  .mono { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-variant-numeric:tabular-nums; }

  header { display:flex; align-items:center; gap:8px; padding:10px 14px;
    background:var(--panel); border-bottom:1px solid var(--line); }
  .sym-btn { display:flex; align-items:center; gap:6px; background:transparent;
    border:none; color:var(--text); font-size:17px; font-weight:700; letter-spacing:.5px; cursor:pointer; }
  .sym-btn .caret { color:var(--muted); font-size:12px; }
  .sym-btn .fav { color:var(--star); font-size:14px; }
  .badge { font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; letter-spacing:.5px; }
  .badge.real   { background:rgba(38,166,154,.18); color:var(--up); }
  .badge.sample { background:rgba(120,123,134,.18); color:var(--muted); }
  .gear { margin-left:auto; background:transparent; border:none; color:var(--muted); font-size:18px; cursor:pointer; }
  .tf { display:flex; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tf button { background:transparent; color:var(--muted); border:none; border-radius:6px;
    padding:6px 10px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; flex:0 0 auto; }
  .tf button.active { background:var(--accent); color:#fff; }

  .legend { display:flex; flex-wrap:wrap; gap:6px 16px; padding:8px 14px; font-size:13px;
    border-bottom:1px solid var(--line); }
  .legend .item { color:var(--muted); }
  .legend .item b { color:var(--text); font-weight:600; margin-left:4px; }
  .legend .up { color:var(--up); } .legend .down { color:var(--down); }
  /* ヘッダーと数値の行は左右スワイプで銘柄切替に使うので、文字選択を無効に */
  header, .legend { -webkit-user-select:none; user-select:none; touch-action:pan-y; }

  /* 分割レイアウト（1画面 / 上下 / 左右） */
  #splitWrap { flex:1; min-height:0; display:flex; }   /* ヘッダー等を除いた残りを全部使う */
  #splitWrap.split-1 { flex-direction:column; }
  #splitWrap.split-v { flex-direction:column; }   /* 上下 */
  #splitWrap.split-h { flex-direction:row; }      /* 左右 */
  #chartWrap { position:relative; flex:1; min-width:0; min-height:0; }
  #chart { width:100%; height:100%; }
  #c2pane { flex:1; min-width:0; min-height:0; display:none; flex-direction:column; border-top:1px solid var(--line); }
  .split-h #c2pane { border-top:none; border-left:1px solid var(--line); }
  #c2bar { display:flex; align-items:center; gap:10px; padding:4px 10px; font-size:12px; color:var(--muted);
    -webkit-user-select:none; user-select:none; touch-action:pan-y; }
  #c2bar #c2sym { color:var(--text); font-weight:700; font-size:13px; }
  #chart2 { flex:1; min-height:0; }
  #layoutBtn { margin-left:auto; background:transparent; border:1px solid var(--line); color:var(--muted);
    border-radius:6px; padding:4px 9px; font-size:12px; font-weight:700; cursor:pointer; }
  /* チャート最大化中は、チャート以外の帯を隠す（ツールバーだけ残す） */
  body.max header, body.max .legend, body.max footer,
  body.max #tfRow, body.max .listTabs { display:none !important; }
  /* 最大化を解除する小さな戻るボタン（最大化中だけ右上に出る） */
  #unmaxBtn { position:fixed; top:8px; right:8px; z-index:30; display:none;
    background:rgba(22,27,36,.9); border:1px solid var(--line); color:var(--text);
    border-radius:6px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; }
  body.max #unmaxBtn { display:block; }
  #maxBtn { background:transparent; border:1px solid var(--line); color:var(--muted);
    border-radius:6px; padding:4px 9px; font-size:12px; font-weight:700; cursor:pointer; margin-left:6px; }
  /* z-index（重なり順の番号）が重要：チャート部品は内部で番号を持って前に出るため、
     こちらのレイヤーには明示的に大きい番号を付けて、必ずチャートより上に置く */
  #overlay { position:absolute; inset:0; pointer-events:none; z-index:5; touch-action:none; }
  #catcher { position:absolute; inset:0; display:none; background:transparent; touch-action:none; cursor:crosshair; z-index:6; }
  .tools { display:flex; align-items:center; gap:6px; padding:8px 14px; border-bottom:1px solid var(--line); overflow-x:auto; white-space:nowrap; }
  .tools button { background:#1c2431; color:var(--text); border:1px solid var(--line); border-radius:6px; padding:6px 10px; font-size:12px; font-weight:600; cursor:pointer; }
  .tools button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tools input[type=color] { width:30px; height:30px; padding:0; border:1px solid var(--line); border-radius:6px; background:transparent; cursor:pointer; }
  footer { padding:8px 14px; font-size:11px; color:var(--muted); border-top:1px solid var(--line); min-height:34px; }
  footer .err { color:var(--down); }

  .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; visibility:hidden; transition:opacity .2s; z-index:10; }
  .backdrop.open { opacity:1; visibility:visible; }
  .drawer { position:fixed; top:0; left:0; height:100%; width:82%; max-width:340px;
    background:var(--panel); border-right:1px solid var(--line);
    transform:translateX(-100%); transition:transform .22s ease; z-index:11; display:flex; flex-direction:column; }
  .drawer.open { transform:translateX(0); }
  .drawer h2 { margin:0; padding:14px; font-size:15px; border-bottom:1px solid var(--line); display:flex; align-items:center; }
  .drawer h2 button { margin-left:auto; background:transparent; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; }
  .list { overflow-y:auto; flex:1; }
  .row { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
  .row.active { background:#1c2431; }
  .row .star { font-size:18px; color:#3a4250; width:22px; text-align:center; }
  .row .star.on { color:var(--star); }
  .row .tk { font-weight:700; font-size:15px; }
  .row .nm { color:var(--muted); font-size:11px; }
  .row .rt { margin-left:auto; text-align:right; }
  .row .price { font-size:14px; }
  .row .chg.up { color:var(--up); } .row .chg.down { color:var(--down); }
  .row .chg { font-size:12px; }
  .sec-label { padding:8px 14px; font-size:11px; color:var(--muted); background:#12161e; letter-spacing:1px; }
  .search { display:flex; gap:6px; padding:10px 14px; border-bottom:1px solid var(--line); }
  .search input { flex:1; min-width:0; background:#0e1117; border:1px solid var(--line); color:var(--text);
    border-radius:6px; padding:8px 10px; font-size:14px; text-transform:uppercase; }
  .search input::placeholder { color:var(--muted); text-transform:none; }
  .search button { border:none; border-radius:6px; padding:0 12px; font-size:13px; font-weight:700;
    cursor:pointer; white-space:nowrap; color:#fff; }
  .search #showBtn { background:var(--accent); }
  .search #addBtn { background:#2a3242; }
  .row .del { color:#5b6472; font-size:17px; padding:0 2px 0 6px; }
  /* 複数ウォッチリストの切り替えタブ（チップ） */
  .listTabs { display:flex; gap:6px; padding:8px 14px 0; flex-wrap:wrap; align-items:center; }
  .chip { background:#1c2431; color:var(--muted); border:1px solid var(--line); border-radius:14px;
    padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; }
  .chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .chip.mini { padding:5px 10px; }
  /* アプリ内の入力画面（promptの代わり。どの環境でも確実に動く） */
  .modalBack { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:center; justify-content:center; z-index:20; }
  .modalBack.open { display:flex; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px; width:84%; max-width:320px; }
  .modal .mtitle { font-size:14px; font-weight:700; margin-bottom:10px; white-space:pre-line; }
  .modal input { width:100%; background:#0e1117; border:1px solid var(--line); color:var(--text);
    border-radius:6px; padding:9px 10px; font-size:14px; }
  .modal .mbtns { display:flex; gap:8px; margin-top:12px; }
  .modal .mbtns button { flex:1; border:none; border-radius:6px; padding:9px 0; font-size:13px; font-weight:700; cursor:pointer; }
  #modalCancel { background:#2a3242; color:var(--text); }
  #modalOk { background:var(--accent); color:#fff; }
  /* 自作インジケーターの管理画面 */
  .indRow { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); }
  .indRow .nm { flex:1; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #indName { width:100%; background:#0e1117; border:1px solid var(--line); color:var(--text);
    border-radius:6px; padding:9px 10px; font-size:14px; margin-bottom:8px; }
  #indCode { width:100%; height:220px; background:#0e1117; border:1px solid var(--line); color:var(--text);
    border-radius:6px; padding:9px 10px; font-size:12px; line-height:1.5;
    font-family:ui-monospace,"SF Mono",Menlo,monospace; }
  #indListBtns button, #indEditor .mbtns button { flex:1; border:none; border-radius:6px; padding:9px 0;
    font-size:13px; font-weight:700; cursor:pointer; }
  #indClose, #indCancel { background:#2a3242; color:var(--text); }
  #indNew, #indSave { background:var(--accent); color:#fff; }
  /* チャート左上のインジ名チップ（タップで表示/非表示） */
  #indChips { position:absolute; top:6px; left:8px; z-index:7; display:flex; flex-wrap:wrap; gap:4px; max-width:72%; }
  .ichip { display:flex; align-items:center; gap:6px; background:rgba(22,27,36,.88); border:1px solid var(--line);
    border-radius:6px; padding:3px 8px; font-size:11px; color:var(--text); cursor:pointer; }
  .ichip.off { opacity:.4; }
  .ichip.err { border-color:#ef5350; }   /* エラーのあるインジは赤枠 */
  .ichip .g { color:var(--muted); font-size:12px; }
  /* 設定フォームの部品（線の設定・インジの設定で共用） */
  .dsRow { display:flex; align-items:center; gap:10px; margin:10px 0; }
  .dsRow label { min-width:58px; font-size:13px; color:var(--muted); }
  .dsRow select, .pfield { flex:1; min-width:0; background:#0e1117; border:1px solid var(--line); color:var(--text);
    border-radius:6px; padding:8px 10px; font-size:14px; }
  .dsRow input[type=color] { flex:1; height:40px; padding:2px; background:#0e1117; border:1px solid var(--line); border-radius:6px; }
  #ipCode { background:#2a3242 !important; color:var(--text) !important; }
</style>
</head>
<body>

  <header>
    <button class="sym-btn" id="symBtn">
      <span class="fav" id="hdrFav" style="display:none">★</span>
      <span id="hdrTicker">-</span>
      <span class="caret">▾</span>
    </button>
    <span class="badge sample" id="badge">サンプル</span>
    <button id="layoutBtn" title="画面の分割を切り替え">1画面</button>
    <button id="maxBtn" title="チャートを最大化">⛶</button>
    <button class="gear" id="gear" title="APIキー設定" style="margin-left:0;">⚙</button>
  </header>
  <button id="unmaxBtn">⛶ 解除</button>

  <div id="tfRow" style="padding:8px 14px; border-bottom:1px solid var(--line);">
    <div class="tf" id="tfButtons">
      <button data-step="65m">65分</button>
      <button data-step="1d" class="active">日足</button>
      <button data-step="1w">週足</button>
      <button data-step="1M">月足</button>
      <button data-step="3M">3ヶ月</button>
      <button data-step="6M">6ヶ月</button>
      <button id="indBtn" title="自作インジケーター" style="border-left:1px solid var(--line); border-radius:0;">インジ</button>
    </div>
  </div>

  <div class="tools" id="toolbar">
    <button data-tool="hline">─ 水平線</button>
    <button data-tool="trend">／ トレンド</button>
    <button data-tool="rect">▢ 計測ボックス</button>
    <button data-tool="au">↑ 矢印</button>
    <button data-tool="ad">↓ 矢印</button>
    <button data-tool="poly">〰 折線</button>
    <button data-tool="pos">± 損益</button>
    <button data-tool="vp">▤ 出来高P</button>
    <input type="color" id="colorPick" value="#f5c518" title="線の色" />
    <button id="styleBtn" style="display:none;">線の設定</button>
    <button id="delOneBtn" style="display:none; border-color:#ef5350; color:#ef5350;">選択を削除</button>
    <button id="clearBtn">消去</button>
  </div>

  <div class="legend mono">
    <span class="item">O<b id="lg-o">-</b></span>
    <span class="item">H<b id="lg-h">-</b></span>
    <span class="item">L<b id="lg-l">-</b></span>
    <span class="item">C<b id="lg-c">-</b></span>
    <span class="item">前日比<b id="lg-chg">-</b></span>
    <span class="item">出来高<b id="lg-vol">-</b></span>
  </div>

  <div id="splitWrap" class="split-1">
    <div id="chartWrap">
      <div id="chart"></div>
      <svg id="overlay"></svg>
      <div id="catcher"></div>
      <div id="indChips"></div>
    </div>
    <div id="c2pane">
      <div id="c2bar">
        <span id="c2sym">SOXX ▾</span>
        <span id="c2price" class="mono"></span>
      </div>
      <div id="chart2"></div>
    </div>
  </div>
  <footer id="foot">出来高2倍強調つき / ⚙:APIキー / 「インジ」で自作インジを追加できます</footer>

  <div class="backdrop" id="backdrop"></div>
  <aside class="drawer" id="drawer">
    <h2>ウォッチリスト <button id="closeDrawer">×</button></h2>
    <div class="search">
      <input id="tickerInput" class="mono" type="text" placeholder="ティッカー入力 (例: AAPL,NVDA)"
             autocapitalize="characters" autocomplete="off" spellcheck="false" />
      <button id="showBtn">表示</button>
      <button id="addBtn">＋追加</button>
    </div>
    <div class="listTabs" id="listTabs"></div>
    <div class="list" id="list"></div>
  </aside>

  <!-- アプリ内の入力画面（リスト名やAPIキーの入力に使う） -->
  <div class="modalBack" id="modalBack">
    <div class="modal">
      <div class="mtitle" id="modalTitle"></div>
      <input id="modalInput" autocomplete="off" />
      <div class="mbtns">
        <button id="modalCancel">キャンセル</button>
        <button id="modalOk">OK</button>
      </div>
    </div>
  </div>

  <!-- 線の設定（選択した線の色・太さ・線種を変える） -->
  <div class="modalBack" id="dsBack">
    <div class="modal">
      <div class="mtitle">線の設定</div>
      <div class="dsRow"><label>色</label><input type="color" id="dsColor" /></div>
      <div class="dsRow"><label>太さ</label>
        <select id="dsWidth">
          <option value="1">細い</option><option value="2">ふつう</option>
          <option value="3">太い</option><option value="4">極太</option>
        </select></div>
      <div class="dsRow"><label>線種</label>
        <select id="dsStyle">
          <option value="solid">実線</option><option value="dashed">破線</option><option value="dotted">点線</option>
        </select></div>
      <div class="mbtns">
        <button id="dsCancel" style="background:#2a3242; color:var(--text);">閉じる</button>
        <button id="dsOk" style="background:var(--accent); color:#fff;">適用</button>
      </div>
    </div>
  </div>

  <!-- 自作インジケーターの管理・編集画面 -->
  <div class="modalBack" id="indBack">
    <div class="modal" style="width:92%; max-width:560px;">
      <div class="mtitle">自作インジケーター</div>
      <div id="indList"></div>
      <div class="mbtns" id="indListBtns">
        <button id="indClose">閉じる</button>
        <button id="indNew">＋新規作成</button>
      </div>
      <div id="indEditor" style="display:none;">
        <input id="indName" placeholder="インジ名（例: RSI14）" autocomplete="off" />
        <textarea id="indCode" spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
        <div class="mbtns">
          <button id="indCancel">戻る</button>
          <button id="indSave">保存して表示</button>
        </div>
      </div>
      <div id="indParams" style="display:none;">
        <div class="mtitle" id="indParamTitle" style="font-size:13px; color:var(--muted);"></div>
        <div id="indParamFields"></div>
        <div class="mbtns">
          <button id="ipBack">戻る</button>
          <button id="ipCode">コード編集</button>
          <button id="ipSave">保存</button>
        </div>
      </div>
    </div>
  </div>

<script>
/* =========================================================
   保存ヘルパー（お気に入り・APIキーを端末に記憶）
   ・公開版では閉じても残る。プレビュー内はリロードで消える場合あり
   ========================================================= */
const store = {
  get(k, fb){ try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(e){ return fb; } },
  set(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
};

/* エラーが起きたら、下のバーに表示する（今後は画面を見せてもらうだけで原因が分かる） */
window.addEventListener('error', e=>{
  const f=document.getElementById('foot');
  if(f) f.innerHTML = '<span class="err">エラー: '+(e.message||'不明なエラー')+'</span>';
});

/* URLの「#key=～」からAPIキーを受け取る仕組み
   ブックマークのURLにキーを仕込んでおけば、開くだけで毎回自動セットされる。
   （Safariは7日間訪れないサイトの保存データを消すことがあるため、その対策）
   読み取ったらアドレスバーからは消して、肩越しに見られても分からないようにする */
(function(){
  const m = location.hash.match(/key=([A-Za-z0-9]+)/);
  if(m){
    store.set('td-key', m[1]);
    history.replaceState(null, '', location.pathname + location.search);
  }
})();

/* =========================================================
   ① 銘柄リスト … ここに自分の小型株・バイオを足せます
   ========================================================= */
const SYMBOLS = [
  { ticker:'NVDA', name:'エヌビディア', base:120 },
  { ticker:'SOXX', name:'半導体ETF',   base:210 },
  { ticker:'XBI',  name:'バイオETF',    base:95  },
  { ticker:'IWM',  name:'小型株ETF',    base:220 },
  { ticker:'ABCL', name:'AbCellera',    base:5   },
  { ticker:'RXRX', name:'Recursion',    base:7   },
  { ticker:'CRSP', name:'CRISPR',       base:45  },
  { ticker:'BEAM', name:'Beam Thera',   base:25  },
];

/* 時間足の定義表
   api  … Twelve Dataに頼む足の種類
   size … 何本取ってくるか
   agg  … 取った後に「束ねる」処理（65分足=5分×13本、3ヶ月足=月足×3本 など）*/
const TF = {
  '65m': { label:'65分',  api:'5min',   size:5000, agg:'65' },
  '1d':  { label:'日足',  api:'1day',   size:2500 },   // 約10年（上場来判定のため長めに）
  '1w':  { label:'週足',  api:'1week',  size:1000 },   // 約20年
  '1M':  { label:'月足',  api:'1month', size:240 },
  '3M':  { label:'3ヶ月', api:'1month', size:240, agg:3 },
  '6M':  { label:'6ヶ月', api:'1month', size:240, agg:6 },
};

/* --- 束ねる処理の共通部品 ---
   何本かのローソク足を1本にまとめる：始値=最初 / 高値=一番高い / 安値=一番安い / 終値=最後 / 出来高=合計 */
function bundle(bucket, time){
  return {
    candle:{ time, open:+bucket[0].open,
      high: Math.max(...bucket.map(r=>+r.high)),
      low:  Math.min(...bucket.map(r=>+r.low)),
      close:+bucket[bucket.length-1].close },
    volume:{ time, value: bucket.reduce((a,r)=>a+ +(r.volume||0),0) }
  };
}

/* 5分足 → 65分足（同じ日の中で13本ずつ束ねる。9:30開始なら1日ちょうど6本） */
function to65(rows){
  const candles=[], volumes=[];
  let bucket=[], curDay='';
  const flush=()=>{
    if(!bucket.length) return;
    // 時刻つきの足は「秒数（エポック秒）」で持つのがチャート部品の作法
    const t=Math.floor(new Date(bucket[0].datetime.replace(' ','T')).getTime()/1000);
    const b=bundle(bucket, t);
    candles.push(b.candle); volumes.push(b.volume); bucket=[];
  };
  rows.forEach(r=>{
    const day=r.datetime.slice(0,10);
    if(day!==curDay){ flush(); curDay=day; }   // 日が変わったら区切る
    bucket.push(r);
    if(bucket.length===13) flush();            // 13本たまったら1本に
  });
  flush();
  return {candles, volumes};
}

/* 日足 → 週足（月曜はじまりの週ごとに束ねる） */
function toWeeks(rows){
  const candles=[], volumes=[];
  let bucket=[], curKey='';
  // 「今日が世界の始まりから何週目か」を計算して、同じ週の足をまとめる
  const keyOf=r=>{ const days=Math.floor(Date.parse(r.datetime.slice(0,10)+'T00:00:00')/86400000); return Math.floor((days+3)/7); };
  const flush=()=>{
    if(!bucket.length) return;
    const b=bundle(bucket, bucket[0].datetime.slice(0,10));
    candles.push(b.candle); volumes.push(b.volume); bucket=[];
  };
  rows.forEach(r=>{ const key=keyOf(r); if(key!==curKey){ flush(); curKey=key; } bucket.push(r); });
  flush();
  return {candles, volumes};
}

/* 月足 → 3ヶ月足/6ヶ月足（1-3月、4-6月…のように暦で区切って束ねる） */
function toMonths(rows, k){
  const candles=[], volumes=[];
  let bucket=[], curKey='';
  const keyOf=r=>{ const y=r.datetime.slice(0,4), m=+r.datetime.slice(5,7); return y+'-'+Math.floor((m-1)/k); };
  const flush=()=>{
    if(!bucket.length) return;
    const b=bundle(bucket, bucket[0].datetime.slice(0,10));
    candles.push(b.candle); volumes.push(b.volume); bucket=[];
  };
  rows.forEach(r=>{ const key=keyOf(r); if(key!==curKey){ flush(); curKey=key; } bucket.push(r); });
  flush();
  return {candles, volumes};
}

/* =========================================================
   ② 実データ取得（Twelve Data）
   キーが無い/失敗した時は例外を投げ、呼び出し側でサンプルに切替
   ========================================================= */
async function fetchReal(symbol, step){
  const key = store.get('td-key','');
  if(!key) throw { kind:'nokey' };
  const tf = TF[step];
  const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}`
            + `&interval=${tf.api}&outputsize=${tf.size}&apikey=${key}`;
  const res = await fetch(url);
  const json = await res.json();
  if(json.status === 'error' || !json.values) throw { kind:'api', message: json.message || '取得失敗' };
  // Twelve Dataは「新しい順」で返すので、古い順に並べ替える
  const rows = json.values.slice().reverse();
  if(tf.agg==='65') return to65(rows);              // 65分足に束ねる
  if(tf.agg)        return toMonths(rows, tf.agg);  // 3ヶ月/6ヶ月足に束ねる
  const candles = rows.map(v => ({ time:v.datetime.slice(0,10), open:+v.open, high:+v.high, low:+v.low, close:+v.close }));
  const volumes = rows.map(v => ({ time:v.datetime.slice(0,10), value:+(v.volume||0) }));
  return { candles, volumes };
}

/* =========================================================
   ③ サンプルデータ（キーが無い時／取得失敗時のフォールバック）
   本物と同じ考え方：まず「日足の歴史」を1本だけ作り、
   週足・月足・3ヶ月・6ヶ月・65分足は全部そこから束ねて作る。
   → どの時間足でも同じ値動き・同じ価格帯になる
   ========================================================= */
function seedFrom(s){ let h=2166136261; for(const c of s){ h^=c.charCodeAt(0); h=Math.imul(h,16777619);} return (h>>>0)%1e6+1; }
const r2=n=>Math.round(n*100)/100;

/* 銘柄ごとに「約20年ぶんの日足」を1回だけ作ってキャッシュする */
const dailyCache={};
function dailyRowsFor(ticker){
  if(dailyCache[ticker]) return dailyCache[ticker];
  const sym=SYMBOLS.find(s=>s.ticker===ticker);
  const base=sym?sym.base:20;
  let s=seedFrom(ticker); const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };

  // 平日（月〜金）の日付を過去20年ぶん集める
  const dates=[]; const d=new Date();
  while(dates.length<5040){                     // 252営業日 × 20年
    const dow=d.getDay();
    if(dow!==0 && dow!==6) dates.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()-1);
  }
  dates.reverse();

  // ランダムウォークで日足を作る（1日±1%程度、ゆるい上昇バイアス）
  let price=base; const rows=[];
  for(const date of dates){
    const open=price;
    const close=Math.max(0.5, open+(rnd()-0.495)*price*0.02);
    const high=Math.max(open,close)+rnd()*price*0.01;
    const low =Math.min(open,close)-rnd()*price*0.01;
    rows.push({ datetime:date, open, high, low, close,
      volume:Math.round((0.4+rnd()*1.4)*(rnd()<0.12?3:1)*1_000_000) });
    price=close;
  }
  // 最後の終値がちょうど base になるよう、全体を同じ倍率で調整
  const f=base/rows[rows.length-1].close;
  rows.forEach(r=>{ r.open=r2(r.open*f); r.high=r2(r.high*f); r.low=r2(r.low*f); r.close=r2(r.close*f); });
  return dailyCache[ticker]=rows;
}

/* 日足の並びを、チャートに渡す形（candles/volumes）に変える */
function rowsToRaw(rows){
  return {
    candles: rows.map(r=>({ time:r.datetime.slice(0,10), open:r.open, high:r.high, low:r.low, close:r.close })),
    volumes: rows.map(r=>({ time:r.datetime.slice(0,10), value:r.volume }))
  };
}

/* 直近の日足から65分足を作る（1日6本、9:30開始。始値と終値は日足と一致させる） */
function make65FromDaily(rows){
  const candles=[], volumes=[];
  const days=rows.slice(-45);                       // 直近45営業日ぶん
  let s=seedFrom('65m'); const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
  days.forEach(r=>{
    const t0=Math.floor(Date.parse(r.datetime+'T09:30:00')/1000);
    let p=r.open;
    for(let i=0;i<6;i++){
      const open=p;
      // その日の始値→終値へ少しずつ近づけ、最後の1本はぴったり終値で締める
      const target=r.open+(r.close-r.open)*((i+1)/6);
      const close=(i===5)? r.close : r2(target+(rnd()-0.5)*r.open*0.004);
      const high=r2(Math.max(open,close)+rnd()*r.open*0.003);
      const low =r2(Math.min(open,close)-rnd()*r.open*0.003);
      candles.push({ time:t0+i*65*60, open:r2(open), high, low, close });
      volumes.push({ time:t0+i*65*60, value:Math.round(r.volume/6*(0.6+rnd()*0.8)) });
      p=close;
    }
  });
  return {candles, volumes};
}

/* 共通の後処理：EMA40と出来高2倍強調 */
function colorVolumes(candles,volumes){
  const W=15;   // サージ判定に使う「直近何本の平均か」
  // 先に「年ごとの最高出来高」と「全期間の最高出来高」を調べておく
  const yearOf=t=> typeof t==='number' ? new Date(t*1000).getFullYear() : +String(t).slice(0,4);
  const yearMax={}; let allMax=0;
  volumes.forEach((v,i)=>{
    const y=yearOf(candles[i].time);
    if(!(y in yearMax) || v.value>yearMax[y]) yearMax[y]=v.value;
    if(v.value>allMax) allMax=v.value;
  });
  return volumes.map((v,i)=>{
    const sl=volumes.slice(Math.max(0,i-W),i);
    const avg=sl.length?sl.reduce((a,b)=>a+b.value,0)/sl.length:v.value;
    const up=candles[i].close>=candles[i].open;
    const y=yearOf(candles[i].time);
    // 色の優先順位: 全期間最高 > その年の最高 > 2倍サージ > 通常
    let color;
    if(v.value===allMax && allMax>0)           color='#e040fb';   // 紫: 読み込んだ全期間での最高
    else if(v.value===yearMax[y] && v.value>0) color='#ffffff';   // 白: その年の最高(今年=年初来高出来高)
    else if(v.value>=avg*2)                    color='#f5a623';   // アンバー: 平均の2倍サージ
    else color = up ? 'rgba(38,166,154,0.45)' : 'rgba(239,83,80,0.45)';
    return {time:v.time, value:v.value, color};
  });
}
function pack(raw){ return { candles:raw.candles, vols:colorVolumes(raw.candles,raw.volumes) }; }

/* サンプルをキャッシュして返す（全部、同じ日足の歴史から束ねて作る） */
const sampleCache={};
function sampleDataset(ticker,step){
  const key=ticker+'@'+step; if(sampleCache[key]) return sampleCache[key];
  const rows=dailyRowsFor(ticker);
  let raw;
  if(step==='65m')      raw=make65FromDaily(rows);            // 直近の日足から65分足を合成
  else if(step==='1d')  raw=rowsToRaw(rows.slice(-2520));    // 約10年ぶん
  else if(step==='1w')  raw=toWeeks(rows);                    // 約20年ぶんを週で束ねる
  else if(step==='1M')  raw=toMonths(rows,1);                 // 月で束ねる（約20年）
  else if(step==='3M')  raw=toMonths(rows,3);                 // 四半期で束ねる
  else                  raw=toMonths(rows,6);                 // 半年で束ねる
  return sampleCache[key]=pack(raw);
}

/* =========================================================
   Pine風の計算道具箱「ta」
   自作インジの中で ta.ema(close, 40) のように使える。
   どれも「配列を受け取って、同じ長さの配列を返す」仕組み。
   値が計算できない最初の数本は null（何も表示しない）になる
   ========================================================= */
const ta = {
  /* 「まだ計算できない(null)」を安全に扱うための小道具 */
  _num(v){ return (v==null || !isFinite(v)) ? null : v; },

  /* 単純移動平均（窓の中が全部そろった時だけ値を出す） */
  sma(src, len){
    const out=new Array(src.length).fill(null);
    let sum=0, cnt=0;
    for(let i=0;i<src.length;i++){
      const v=ta._num(src[i]);
      if(v!=null){ sum+=v; cnt++; }
      const j=i-len;
      if(j>=0){ const w=ta._num(src[j]); if(w!=null){ sum-=w; cnt--; } }
      if(i>=len-1 && cnt===len) out[i]=sum/len;
    }
    return out;
  },
  /* 指数移動平均（計算できない所は飛ばして、値が来てから始める） */
  ema(src, len){
    const out=new Array(src.length).fill(null); const k=2/(len+1); let prev=null;
    for(let i=0;i<src.length;i++){
      const v=ta._num(src[i]);
      if(v==null){ out[i]=null; continue; }
      prev = prev==null ? v : v*k + prev*(1-k);
      out[i]=prev;
    }
    return out;
  },
  /* 加重移動平均 */
  wma(src, len){
    const out=new Array(src.length).fill(null); const denom=len*(len+1)/2;
    for(let i=len-1;i<src.length;i++){
      let sum=0, okAll=true;
      for(let j=0;j<len;j++){ const v=ta._num(src[i-j]); if(v==null){ okAll=false; break; } sum+=v*(len-j); }
      if(okAll) out[i]=sum/denom;
    }
    return out;
  },
  /* Wilder平均（RSIやATRの中で使う） */
  rma(src, len){
    const out=new Array(src.length).fill(null); let prev=null;
    for(let i=0;i<src.length;i++){
      const v=ta._num(src[i]);
      if(v==null){ out[i]=null; continue; }
      prev = prev==null ? v : (prev*(len-1)+v)/len;
      out[i]=prev;
    }
    return out;
  },
  /* RSI */
  rsi(src, len){
    const n=src.length, gains=new Array(n).fill(0), losses=new Array(n).fill(0);
    for(let i=1;i<n;i++){ const d=src[i]-src[i-1]; gains[i]=Math.max(d,0); losses[i]=Math.max(-d,0); }
    const ag=ta.rma(gains,len), al=ta.rma(losses,len);
    return src.map((_,i)=>{
      if(i===0 || ag[i]==null || al[i]==null) return null;
      return al[i]===0 ? 100 : 100 - 100/(1 + ag[i]/al[i]);
    });
  },
  /* 直近len本の最高値・最安値（有効な値が1つも無ければnull） */
  highest(src, len){
    const out=new Array(src.length).fill(null);
    for(let i=0;i<src.length;i++){
      let m=-Infinity, any=false;
      for(let j=Math.max(0,i-len+1);j<=i;j++){ const v=ta._num(src[j]); if(v!=null){ any=true; if(v>m)m=v; } }
      out[i]=any?m:null;
    }
    return out;
  },
  lowest(src, len){
    const out=new Array(src.length).fill(null);
    for(let i=0;i<src.length;i++){
      let m=Infinity, any=false;
      for(let j=Math.max(0,i-len+1);j<=i;j++){ const v=ta._num(src[j]); if(v!=null){ any=true; if(v<m)m=v; } }
      out[i]=any?m:null;
    }
    return out;
  },
  /* 累積合計 */
  cum(src){ let sum=0; return src.map(v=>{ const n=ta._num(v); if(n!=null) sum+=n; return sum; }); },
  /* n本前との差 */
  change(src, n=1){
    return src.map((_,i)=>{
      if(i<n) return null;
      const a=ta._num(src[i]), b=ta._num(src[i-n]);
      return (a==null||b==null) ? null : a-b;
    });
  },
  /* n本前からの変化率(%) */
  roc(src, len=1){
    return src.map((_,i)=>{
      if(i<len) return null;
      const a=ta._num(src[i]), b=ta._num(src[i-len]);
      return (a==null||b==null||b===0) ? null : (a-b)/b*100;
    });
  },
  /* 標準偏差（ボリンジャーバンドの材料） */
  stdev(src, len){
    const out=new Array(src.length).fill(null);
    for(let i=len-1;i<src.length;i++){
      let sum=0, cnt=0;
      for(let j=i-len+1;j<=i;j++){ const v=ta._num(src[j]); if(v==null){ cnt=-1; break; } sum+=v; cnt++; }
      if(cnt!==len) continue;
      const mean=sum/len;
      let sq=0;
      for(let j=i-len+1;j<=i;j++) sq+=Math.pow(src[j]-mean,2);
      out[i]=Math.sqrt(sq/len);
    }
    return out;
  },
  /* ATR: 1本あたりの実質的な値動き幅の平均（ボラの物差し） */
  atr(high, low, close, len=14){
    const tr=high.map((h,i)=>{
      if(i===0) return high[0]-low[0];
      return Math.max(high[i]-low[i], Math.abs(high[i]-close[i-1]), Math.abs(low[i]-close[i-1]));
    });
    return ta.rma(tr, len);
  },
  /* aがbを上抜けた/下抜けた瞬間だけ true（どちらかが計算不能なら反応しない） */
  crossover(a,b){
    return a.map((_,i)=> i>0
      && ta._num(a[i-1])!=null && ta._num(b[i-1])!=null && ta._num(a[i])!=null && ta._num(b[i])!=null
      && a[i-1]<=b[i-1] && a[i]>b[i]);
  },
  crossunder(a,b){
    return a.map((_,i)=> i>0
      && ta._num(a[i-1])!=null && ta._num(b[i-1])!=null && ta._num(a[i])!=null && ta._num(b[i])!=null
      && a[i-1]>=b[i-1] && a[i]<b[i]);
  },
};


/* =========================================================
   自作インジケーター（Pine風のコードをアプリ内で書いて表示）
   書いたコードは端末に保存され、銘柄・時間足を変えても自動で再計算される
   ========================================================= */
let indicators = store.get('custom-inds', []);   // 保存済みの自作インジ一覧
let customSeries = [];                            // いま画面に出している線
let customMarkers = null;                         // いま画面に出している矢印
let editingId = null;                             // 編集中のインジのID

/* 新規作成のときに最初から入っているお手本コード */
const IND_TEMPLATE = `// ここにPine風のコードを書きます
// 材料: open, high, low, close, volume（すべて配列）
// 道具: ta.sma ta.ema ta.wma ta.rsi ta.highest ta.lowest
//       ta.cum ta.change ta.roc ta.stdev ta.atr(high,low,close,期間)
//       ta.crossover ta.crossunder
// 重ねがけOK: ta.sma(ta.rsi(close,14), 5) のように組み合わせられます
// 線を引く: plot(値, {color:'#色', width:太さ, style:'solid/dashed/dotted', pane:'sub'か'main'})
// 矢印: signal(条件, {shape:'up'か'down', text:'GC'})
// input('名前', 初期値) と書くと、⚙設定から変えられるようになります

// 例① 期間・色を⚙設定から変えられるEMA
const len = input('期間', 40);
const col = input('色', '#f5a623');
plot(ta.ema(close, len), { color: col, width: 2, pane: 'main' });

// 例② RSIを下の枠に（先頭の//を消すと動く）
// plot(ta.rsi(close, input('RSI期間', 14)), { color:'#e91e63', pane:'sub' });
`;

/* 1つのインジのコードを実行して、「引きたい線」と「出したい矢印」を集める */
function runIndicatorCode(ind){
  const plots=[], signals=[], inputs=[];
  const openA=currentCandles.map(c=>c.open),  highA=currentCandles.map(c=>c.high);
  const lowA =currentCandles.map(c=>c.low),   closeA=currentCandles.map(c=>c.close);
  const volA =currentVols.map(v=>v.value);
  const plot  =(series,opt)=>plots.push({series, opt:opt||{}});
  const signal=(arr,opt)=>signals.push({arr, opt:opt||{}});
  // input('名前', 初期値) … ⚙設定画面から変えられる値。保存済みの値があればそれを使う
  const input=(name,def)=>{
    inputs.push({name, def});
    const p=ind.params||{};
    let v=(p[name]!==undefined) ? p[name] : def;
    if(typeof def==='number'){ v=Number(v); if(!isFinite(v)) v=def; }
    return v;
  };
  // 書いたコードを関数に変換して実行（open/close/ta/plot などを渡す）
  const fn=new Function('open','high','low','close','volume','ta','plot','signal','input', ind.code);
  fn(openA, highA, lowA, closeA, volA, ta, plot, signal, input);
  return {plots, signals, inputs};
}

/* 表示中の自作インジを全部消す */
function clearCustom(){
  customSeries.forEach(s=>{ try{ chart.removeSeries(s); }catch(e){} });
  customSeries=[];
  if(customMarkers) customMarkers.setMarkers([]);
}

/* ONになっている自作インジを全部計算して表示する */
function applyIndicators(){
  clearCustom();
  if(!currentCandles.length){ renderChips(); return; }
  // 下の枠は「インジごとに専用の枠」を1つずつ割り当てる
  // （RSIとADLのように縮尺が違うもの同士が、同じ枠で潰れないように）
  let nextSub=1;
  let markers=[];
  indicators.filter(x=>x.on).forEach(ind=>{
    try{
      const {plots, signals}=runIndicatorCode(ind);
      // このインジが下の枠を使うなら、専用の枠番号を1つ確保
      const myPane = plots.some(p=>p.opt.pane!=='main') ? nextSub++ : 0;
      plots.forEach(p=>{
        const s=chart.addSeries(LightweightCharts.LineSeries,
          { color:p.opt.color||'#00bcd4', lineWidth:p.opt.width||2,
            lineStyle: p.opt.style==='dashed' ? 2 : p.opt.style==='dotted' ? 1 : 0,
            priceLineVisible:false, lastValueVisible:false },
          p.opt.pane==='main' ? 0 : myPane);
        s.setData(currentCandles
          .map((c,i)=>({time:c.time, value:p.series[i]}))
          .filter(x=>x.value!=null && isFinite(x.value)));
        customSeries.push(s);
      });
      signals.forEach(sg=>{
        currentCandles.forEach((c,i)=>{
          if(sg.arr[i]) markers.push({
            time:c.time,
            position: sg.opt.shape==='down' ? 'aboveBar' : 'belowBar',
            color: sg.opt.color || (sg.opt.shape==='down' ? '#ef5350' : '#26a69a'),
            shape: sg.opt.shape==='down' ? 'arrowDown' : 'arrowUp',
            text: sg.opt.text||'' });
        });
      });
      delete ind._err;   // 正常に動いたのでエラー印を消す
    }catch(e){
      // コードに間違いがあっても止まらず、印を付けて下のバーに理由を出す
      ind._err=e.message;
      setFoot('インジ「'+ind.name+'」でエラー: '+e.message);
    }
  });
  markers.sort((a,b)=>toEpoch(a.time)-toEpoch(b.time));
  if(markers.length && !customMarkers) customMarkers=LightweightCharts.createSeriesMarkers(candleSeries, []);
  if(customMarkers) customMarkers.setMarkers(markers);
  renderChips();   // エラー印も含めて、チップを最新の状態にする
}

/* ---- チャート左上のチップ（名前タップ=表示/非表示、⚙=設定） ---- */

  const box=$('indChips'); if(!box) return;
  box.innerHTML='';
  indicators.forEach(ind=>{
    const c=document.createElement('div');
    c.className='ichip'+(ind.on?'':' off')+(ind._err?' err':'');

    c.innerHTML=`<span>${ind.name}</span><span class="g" data-g="1">⚙</span>`;

  });
}

});

/* =========================================================
   ⑦ 描画ツール（透明レイヤーで描くので後から動かせる）
   ・水平線：上下ドラッグで移動
   ・トレンド：両端の丸で長さ/角度を変更、線の真ん中で全体移動
   ・計測ボックス：四角で囲むと変化率%・値幅・本数を表示、角でリサイズ
   ========================================================= */
function setFoot(msg){ $('foot').textContent = msg; }

const svg = $('overlay');
const TS = ()=>chart.timeScale();
// 「何本目か(logical)」「価格」⇔ 画面ピクセル の変換
function Lx(l){ return TS().logicalToCoordinate(l); }
function Py(p){ return candleSeries.priceToCoordinate(p); }
function xToL(x){ return TS().coordinateToLogical(x); }
function yToP(y){ return candleSeries.coordinateToPrice(y); }

/* --- 線を「世界共通の時刻（エポック秒）」で覚えるための変換 ---
   日足の日付でも65分足の時刻でも、全部「秒数」に直して覚える。
   こうすると、どの時間足に切り替えても同じ値段・同じ時間の場所に線が出る */
let epochs=[];   // いま表示中の各ローソク足の時刻（秒数）一覧
function toEpoch(t){ return typeof t==='number' ? t : Math.floor(Date.parse(t+'T00:00:00')/1000); }

// 時刻(秒) → 「何本目か」（小数もあり。データの外側でも延長線上で計算する）
function tsToLogical(ts){
  const e=epochs, n=e.length-1; if(n<1) return null;
  if(ts<=e[0]) return (ts-e[0])/(e[1]-e[0]);
  if(ts>=e[n]) return n+(ts-e[n])/(e[n]-e[n-1]);
  let lo=0, hi=n;
  while(hi-lo>1){ const mid=(lo+hi)>>1; if(e[mid]<=ts) lo=mid; else hi=mid; }
  return lo+(ts-e[lo])/(e[hi]-e[lo]);
}
// 「何本目か」→ 時刻(秒)（上の逆変換）
function logicalToTs(l){
  const e=epochs, n=e.length-1; if(n<1) return null;
  if(l<=0) return e[0]+l*(e[1]-e[0]);
  if(l>=n) return e[n]+(l-n)*(e[n]-e[n-1]);
  const i=Math.floor(l); return e[i]+(l-i)*(e[i+1]-e[i]);
}
// 画面の横位置 ⇔ 時刻(秒)
function xToTs(x){ const l=xToL(x); if(l==null) return null; const ts=logicalToTs(l); return ts==null?null:Math.round(ts); }
function tsToX(ts){ const l=tsToLogical(ts); return l==null?null:Lx(l); }

function hideDelBtn(){ $('delOneBtn').style.display='none'; $('styleBtn').style.display='none'; }
// 指/マウスの位置を、チャート左上からのピクセルに直す
function pos(e){ const r=svg.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }
// SVG部品を作る小道具
function el(tag, a){ const n=document.createElementNS('http://www.w3.org/2000/svg',tag); for(const k in a) n.setAttribute(k,a[k]); return n; }

/* =========================================================
   図形の描画は「作る(build)」と「動かす(layout)」を分ける
   重要：ドラッグ中に部品を作り直すと、指が触れている部品ごと
   消えてしまい、iPhoneが「触っていた物が消えた」と判断して
   ドラッグを打ち切り、残りの指の動きがスクロールになってしまう。
   → 作り直すのは図形が増減した時だけ。ドラッグ中は位置だけ動かす
   ========================================================= */
let elMap={};   // 図形ID → その図形の画面部品セット

function syncSize(){
  const w=$('chart').clientWidth, h=$('chart').clientHeight;
  svg.setAttribute('width',w); svg.setAttribute('height',h);
}
function setPos(node, attrs){ for(const k in attrs) node.setAttribute(k, attrs[k]); }
function showParts(parts, on){
  for(const k in parts){
    const v=parts[k];
    if(Array.isArray(v)){            // 出来高Pの棒24本や、折線の頂点のような「部品の束」
      v.forEach(n=>{ if(n&&n.setAttribute) n.setAttribute('visibility', on?'visible':'hidden'); });
    } else if(v && v.setAttribute){  // ふつうの部品1つ
      v.setAttribute('visibility', on?'visible':'hidden');
    }
  }
}

// 図形1つぶんの部品を作る（位置は layoutOne が決める）
function buildOne(d){
  const parts={};
  if(d.type==='hline'){
    // 掴むための透明な帯 → 見える線 → 価格ラベル
    parts.hit=el('line',{stroke:'transparent','stroke-width':28,'data-id':d.id,'data-role':'move',style:'pointer-events:all;cursor:ns-resize;touch-action:none'});
    parts.vis=el('line',{stroke:d.color,style:'pointer-events:none'});
    parts.txt=el('text',{x:6,fill:d.color,'font-size':11,style:'pointer-events:none'});
    svg.appendChild(parts.hit); svg.appendChild(parts.vis); svg.appendChild(parts.txt);
  } else if(d.type==='rect'){
    parts.body=el('rect',{fill:d.color,'fill-opacity':0.12,stroke:d.color,'data-id':d.id,'data-role':'body',style:'pointer-events:all;cursor:move;touch-action:none'});
    parts.txt=el('text',{fill:d.color,'font-size':11,'font-weight':'700',style:'pointer-events:none'});
    svg.appendChild(parts.body); svg.appendChild(parts.txt);
    addHandles(parts, d);
  } else if(d.type==='arrow'){
    // 矢印: 見えない丸=当たり判定、pathで矢印の形を描く
    parts.hit=el('circle',{r:18,fill:'transparent','data-id':d.id,'data-role':'move',style:'pointer-events:all;cursor:move;touch-action:none'});
    parts.vis=el('path',{fill:d.color,style:'pointer-events:none'});
    svg.appendChild(parts.hit); svg.appendChild(parts.vis);
  } else if(d.type==='poly'){
    // 折線: 1本のつながった線＋各頂点のハンドル
    parts.hit=el('polyline',{fill:'none',stroke:'transparent','stroke-width':28,'data-id':d.id,'data-role':'body',style:'pointer-events:all;cursor:move;touch-action:none'});
    parts.vis=el('polyline',{fill:'none',stroke:d.color,style:'pointer-events:none'});
    svg.appendChild(parts.hit); svg.appendChild(parts.vis);
    parts.vh=[]; parts.vv=[];
    d.pts.forEach((_,vi)=>{
      const h=el('circle',{r:14,fill:'transparent','data-id':d.id,'data-role':'v','data-vi':vi,style:'pointer-events:all;cursor:pointer;touch-action:none'});
      const v=el('circle',{r:6,fill:'#0e1117',stroke:d.color,'stroke-width':2,style:'pointer-events:none'});
      svg.appendChild(h); svg.appendChild(v);
      parts.vh.push(h); parts.vv.push(v);
    });
  } else if(d.type==='pos'){
    // 損益ツール: 緑=利確ゾーン / 赤=損切ゾーン / 3本の線(エントリー・利確・損切)
    parts.zoneT=el('rect',{fill:'#26a69a','fill-opacity':0.14,style:'pointer-events:none'});
    parts.zoneS=el('rect',{fill:'#ef5350','fill-opacity':0.14,style:'pointer-events:none'});
    svg.appendChild(parts.zoneT); svg.appendChild(parts.zoneS);
    parts.hitE=el('line',{stroke:'transparent','stroke-width':26,'data-id':d.id,'data-role':'body',style:'pointer-events:all;cursor:move;touch-action:none'});
    parts.visE=el('line',{stroke:d.color,'stroke-width':1.5,style:'pointer-events:none'});
    parts.hitT=el('line',{stroke:'transparent','stroke-width':24,'data-id':d.id,'data-role':'a',style:'pointer-events:all;cursor:ns-resize;touch-action:none'});
    parts.visT=el('line',{stroke:'#26a69a','stroke-width':1.5,'stroke-dasharray':'6,4',style:'pointer-events:none'});
    parts.hitS=el('line',{stroke:'transparent','stroke-width':24,'data-id':d.id,'data-role':'b',style:'pointer-events:all;cursor:ns-resize;touch-action:none'});
    parts.visS=el('line',{stroke:'#ef5350','stroke-width':1.5,'stroke-dasharray':'6,4',style:'pointer-events:none'});
    parts.txtT=el('text',{fill:'#26a69a','font-size':11,'font-weight':'700',style:'pointer-events:none'});
    parts.txtS=el('text',{fill:'#ef5350','font-size':11,'font-weight':'700',style:'pointer-events:none'});
    [parts.hitE,parts.visE,parts.hitT,parts.visT,parts.hitS,parts.visS,parts.txtT,parts.txtS].forEach(n=>svg.appendChild(n));
  } else if(d.type==='vp'){
    // 価格帯別出来高: 24本の横棒＋範囲の枠
    parts.bars=[];
    for(let k=0;k<24;k++){ const r=el('rect',{style:'pointer-events:none'}); svg.appendChild(r); parts.bars.push(r); }
    parts.frame=el('rect',{fill:'transparent',stroke:d.color,'stroke-width':1,'stroke-dasharray':'4,4','data-id':d.id,'data-role':'body',style:'pointer-events:all;cursor:move;touch-action:none'});
    svg.appendChild(parts.frame);
    addHandles(parts, d);
  } else { // trend
    parts.hit=el('line',{stroke:'transparent','stroke-width':28,'data-id':d.id,'data-role':'body',style:'pointer-events:all;cursor:move;touch-action:none'});
    parts.vis=el('line',{stroke:d.color,style:'pointer-events:none'});
    svg.appendChild(parts.hit); svg.appendChild(parts.vis);
    addHandles(parts, d);
  }
  elMap[d.id]=parts;
  layoutOne(d);
}
// 端点の丸ハンドル（見えない大きめの円=当たり判定 と 見た目の丸）
function addHandles(parts, d){
  parts.hitA=el('circle',{r:16,fill:'transparent','data-id':d.id,'data-role':'a',style:'pointer-events:all;cursor:pointer;touch-action:none'});
  parts.visA=el('circle',{r:8,fill:'#0e1117',stroke:d.color,'stroke-width':2,style:'pointer-events:none'});
  parts.hitB=el('circle',{r:16,fill:'transparent','data-id':d.id,'data-role':'b',style:'pointer-events:all;cursor:pointer;touch-action:none'});
  parts.visB=el('circle',{r:8,fill:'#0e1117',stroke:d.color,'stroke-width':2,style:'pointer-events:none'});
  svg.appendChild(parts.hitA); svg.appendChild(parts.visA);
  svg.appendChild(parts.hitB); svg.appendChild(parts.visB);
}

// 図形1つぶんの位置・見た目を最新にする（部品は消さない）
// 線種（実線/破線/点線）をSVGの点線パターンに変換する
function dashOf(st){ return st==='dashed' ? '8,5' : st==='dotted' ? '2,5' : 'none'; }

function layoutOne(d){
  const parts=elMap[d.id]; if(!parts) return;
  if(d.type==='hline'){
    const y=Py(d.price);
    if(y==null){ showParts(parts,false); return; }
    showParts(parts,true);
    const W=svg.getAttribute('width');
    setPos(parts.hit,{x1:0,y1:y,x2:W,y2:y});
    setPos(parts.vis,{x1:0,y1:y,x2:W,y2:y,'stroke-width':d.width||1.5,'stroke-dasharray':dashOf(d.style)});
    setPos(parts.txt,{y:y-4}); parts.txt.textContent=d.price.toFixed(2);
    return;
  }
  if(d.type==='arrow'){
    const x=tsToX(d.a.t), y=Py(d.a.p);
    if(x==null||y==null){ showParts(parts,false); return; }
    showParts(parts,true);
    setPos(parts.hit,{cx:x, cy:y});
    // 矢印の形（上向きは先端がタップ位置、下向きはその逆）
    const path = d.dir==='up'
      ? `M${x},${y} l-8,12 l5,0 l0,10 l6,0 l0,-10 l5,0 Z`
      : `M${x},${y} l-8,-12 l5,0 l0,-10 l6,0 l0,10 l5,0 Z`;
    setPos(parts.vis,{d:path, fill:d.color});
    return;
  }
  if(d.type==='poly'){
    const coords=d.pts.map(pt=>({x:tsToX(pt.t), y:Py(pt.p)}));
    if(coords.some(c=>c.x==null||c.y==null)){ showParts(parts,false); return; }
    showParts(parts,true);
    const ptsAttr=coords.map(c=>c.x+','+c.y).join(' ');
    setPos(parts.hit,{points:ptsAttr});
    setPos(parts.vis,{points:ptsAttr, stroke:d.color, 'stroke-width':d.width||2, 'stroke-dasharray':dashOf(d.style)});
    coords.forEach((c,vi)=>{
      if(parts.vh[vi]) setPos(parts.vh[vi],{cx:c.x, cy:c.y});
      if(parts.vv[vi]) setPos(parts.vv[vi],{cx:c.x, cy:c.y});
    });
    return;
  }
  if(d.type==='pos'){
    const x1=tsToX(d.a.t);
    const yE=Py(d.a.p), yT=Py(d.target), yS=Py(d.stop);
    if(x1==null||yE==null||yT==null||yS==null){ showParts(parts,false); return; }
    showParts(parts,true);
    const x2=+svg.getAttribute('width');   // 右端まで伸ばす
    setPos(parts.zoneT,{x:x1, y:Math.min(yE,yT), width:Math.max(0,x2-x1), height:Math.abs(yT-yE)});
    setPos(parts.zoneS,{x:x1, y:Math.min(yE,yS), width:Math.max(0,x2-x1), height:Math.abs(yS-yE)});
    setPos(parts.hitE,{x1, y1:yE, x2, y2:yE}); setPos(parts.visE,{x1, y1:yE, x2, y2:yE, stroke:d.color});
    setPos(parts.hitT,{x1, y1:yT, x2, y2:yT}); setPos(parts.visT,{x1, y1:yT, x2, y2:yT});
    setPos(parts.hitS,{x1, y1:yS, x2, y2:yS}); setPos(parts.visS,{x1, y1:yS, x2, y2:yS});
    // 利確%・損切%・リスクリワード比を表示
    const tp=(d.target-d.a.p)/d.a.p*100, sp=(d.stop-d.a.p)/d.a.p*100;
    const rr=Math.abs(d.a.p-d.stop)>0 ? Math.abs(d.target-d.a.p)/Math.abs(d.a.p-d.stop) : 0;
    setPos(parts.txtT,{x:x1+6, y:yT+(yT<yE?-5:14)});
    parts.txtT.textContent=(tp>=0?'+':'')+tp.toFixed(1)+'%（RR '+rr.toFixed(1)+'）';
    setPos(parts.txtS,{x:x1+6, y:yS+(yS>yE?14:-5)});
    parts.txtS.textContent=(sp>=0?'+':'')+sp.toFixed(1)+'%';
    return;
  }
  if(d.type==='vp'){
    const xa=tsToX(d.a.t), xb=tsToX(d.b.t);
    if(xa==null||xb==null){ showParts(parts,false); return; }
    // 期間内のデータから「どの価格帯にどれだけ出来高があるか」を集計（結果は覚えておいて使い回す）
    const key=d.a.t+'|'+d.b.t+'|'+dKey()+'@'+current.step+'|'+currentCandles.length;
    if(!d._vp || d._vp.key!==key){
      const n=currentCandles.length-1;
      let iA=Math.max(0, Math.min(n, Math.round(tsToLogical(d.a.t))));
      let iB=Math.max(0, Math.min(n, Math.round(tsToLogical(d.b.t))));
      if(iA>iB){ const tmp=iA; iA=iB; iB=tmp; }
      let lo=Infinity, hi=-Infinity;
      for(let i=iA;i<=iB;i++){ if(currentCandles[i].low<lo)lo=currentCandles[i].low; if(currentCandles[i].high>hi)hi=currentCandles[i].high; }
      const B=24, vols=new Array(B).fill(0);
      if(hi>lo){
        for(let i=iA;i<=iB;i++){
          const c=currentCandles[i];
          const typ=(c.high+c.low+c.close)/3;                  // その足の代表価格
          const k=Math.max(0, Math.min(B-1, Math.floor((typ-lo)/(hi-lo)*B)));
          vols[k]+=(currentVols[i]?currentVols[i].value:0);
        }
      }
      const maxV=Math.max(...vols, 1);
      d._vp={ key, lo, hi, vols, maxV, poc:vols.indexOf(Math.max(...vols)) };
    }
    const v=d._vp;
    if(!(v.hi>v.lo)){ showParts(parts,false); return; }
    showParts(parts,true);
    const xL=Math.min(xa,xb), xR=Math.max(xa,xb), wAll=Math.max(1,xR-xL);
    const yTop=Py(v.hi), yBot=Py(v.lo);
    if(yTop==null||yBot==null){ showParts(parts,false); return; }
    setPos(parts.frame,{x:xL, y:Math.min(yTop,yBot), width:wAll, height:Math.abs(yBot-yTop), stroke:d.color});
    const B=v.vols.length;
    for(let k=0;k<B;k++){
      const pLo=v.lo+(v.hi-v.lo)*k/B, pHi=v.lo+(v.hi-v.lo)*(k+1)/B;
      const y1=Py(pHi), y2=Py(pLo);
      const w=(v.vols[k]/v.maxV)*wAll*0.95;
      setPos(parts.bars[k],{ x:xL, y:Math.min(y1,y2), width:Math.max(0,w), height:Math.max(1,Math.abs(y2-y1)-1),
        fill: k===v.poc ? 'rgba(245,166,35,0.55)' : 'rgba(100,181,246,0.35)' });
    }
    // ハンドルは枠の左右の中央に
    const yMid=(yTop+yBot)/2;
    setPos(parts.hitA,{cx:xa, cy:yMid}); setPos(parts.visA,{cx:xa, cy:yMid});
    setPos(parts.hitB,{cx:xb, cy:yMid}); setPos(parts.visB,{cx:xb, cy:yMid});
    return;
  }
  const x1=tsToX(d.a.t), y1=Py(d.a.p), x2=tsToX(d.b.t), y2=Py(d.b.p);
  if(x1==null||y1==null||x2==null||y2==null){ showParts(parts,false); return; }
  showParts(parts,true);
  if(d.type==='rect'){
    const x=Math.min(x1,x2), y=Math.min(y1,y2), w=Math.abs(x2-x1), h=Math.abs(y2-y1);
    setPos(parts.body,{x,y,width:w,height:h,'stroke-width':d.width||1.5,'stroke-dasharray':dashOf(d.style)});
    setPos(parts.txt,{x:x+6,y:y+14});
    parts.txt.textContent=statsText(d.a, d.b);   // +3.2% / 値幅 / 本数
  } else {
    setPos(parts.hit,{x1,y1,x2,y2});
    setPos(parts.vis,{x1,y1,x2,y2,'stroke-width':d.width||2,'stroke-dasharray':dashOf(d.style)});
  }
  setPos(parts.hitA,{cx:x1,cy:y1}); setPos(parts.visA,{cx:x1,cy:y1});
  setPos(parts.hitB,{cx:x2,cy:y2}); setPos(parts.visB,{cx:x2,cy:y2});
}

// 1点目の目印の位置を最新にする
function layoutPending(){
  const parts=elMap['pp']; if(!parts) return;
  const x=pendingPoint?tsToX(pendingPoint.t):null, y=pendingPoint?Py(pendingPoint.p):null;
  if(x==null||y==null){ showParts(parts,false); return; }
  showParts(parts,true);
  setPos(parts.dot,{cx:x,cy:y}); setPos(parts.ring,{cx:x,cy:y});
}

// 全部ゼロから作り直す（図形が増減した時だけ。ドラッグ中は呼ばない）
function redrawOverlay(){
  if(!svg) return;
  syncSize();
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  elMap={};
  drawings.forEach(d=>{ try{ buildOne(d); }catch(e){ setFoot('描画エラー('+d.type+'): '+e.message); } });
  if(creating){ try{ buildOne(creating); }catch(e){ setFoot('描画エラー: '+e.message); } }  // 引っぱっている最中のプレビュー
  if(pendingPoly && pendingPoly.length){       // 折線の作成途中（点と仮の線）
    const coords=pendingPoly.map(pt=>({x:tsToX(pt.t), y:Py(pt.p)})).filter(c=>c.x!=null&&c.y!=null);
    if(coords.length>1){
      svg.appendChild(el('polyline',{ points:coords.map(c=>c.x+','+c.y).join(' '),
        fill:'none', stroke:drawColor, 'stroke-width':2, 'stroke-dasharray':'5,4', style:'pointer-events:none' }));
    }
    coords.forEach(c=> svg.appendChild(el('circle',{cx:c.x, cy:c.y, r:5, fill:drawColor, style:'pointer-events:none'})));
  }
  if(pendingPoint){                            // タップ2回方式の「1点目」の目印
    const parts={};
    parts.dot=el('circle',{r:5,fill:drawColor,style:'pointer-events:none'});
    parts.ring=el('circle',{r:10,fill:'none',stroke:drawColor,'stroke-width':1.5,style:'pointer-events:none'});
    svg.appendChild(parts.dot); svg.appendChild(parts.ring);
    elMap['pp']=parts;
    layoutPending();
  }
}
// 位置だけ最新にする（ドラッグ中・チャートを動かした時はこちら）
function layoutOverlay(){
  if(!svg) return;
  syncSize();
  drawings.forEach(d=>{ try{ layoutOne(d); }catch(e){ setFoot('描画エラー('+d.type+'): '+e.message); } });
  if(creating){ try{ layoutOne(creating); }catch(e){ setFoot('描画エラー: '+e.message); } }
  layoutPending();
}

/* ---------------------------------------------------------
   新規作成：押したまま引っぱると、線がついてくる（離した所で確定）
   すぐ離した場合は「タップ2回」方式として1点目を覚えておく
   --------------------------------------------------------- */
let pendingPoint=null;                                   // タップ2回方式の1点目
let pendingPoly=null;                                    // 折線の作成途中の点たち
let creating=null, createStart=null, createMoved=false;  // 引っぱり中のプレビュー

// 計測の途中経過（+3.2% / 値幅 / 本数）を作る
function statsText(a,b){
  const pct=(b.p-a.p)/a.p*100, diff=b.p-a.p, bars=Math.round(Math.abs(tsToLogical(b.t)-tsToLogical(a.t)));
  return (pct>=0?'+':'')+pct.toFixed(2)+'% / '+(diff>=0?'+':'')+diff.toFixed(2)+' / '+bars+'本';
}
// 画面上の位置（クライアント座標）→ チャート左上からのピクセル
function chartXY(e){ const r=$('chart').getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }

$('catcher').addEventListener('pointerdown', e=>{
  if(!tool) return;
  e.preventDefault(); // チャート側に触れさせない
  const {x,y}=chartXY(e);
  const price=yToP(y), t=xToTs(x);
  if(price==null||t==null){ setFoot('チャートの内側をタップしてください'); return; }

  if(tool==='hline'){
    // 押している間は上下に微調整でき、離した場所に置かれる
    creating={ id:0, type:'hline', color:drawColor, price };
    createStart={x,y}; createMoved=false;
    setFoot('価格 '+price.toFixed(2)+'（離すと確定）');
    redrawOverlay(); return;
  }
  if(tool==='au' || tool==='ad'){
    // 矢印: 押している間は位置を微調整でき、離した場所に置かれる
    creating={ id:0, type:'arrow', dir:(tool==='au'?'up':'down'), color:drawColor, a:{t, p:price} };
    createStart={x,y}; createMoved=false;
    redrawOverlay(); return;
  }
  if(tool==='pos'){
    // 損益ツール: タップした価格をエントリーとして、利確+14%/損切-7%の箱を作る
    creating={ id:0, type:'pos', color:drawColor, a:{t, p:price},
               target:+(price*1.14).toFixed(4), stop:+(price*0.93).toFixed(4) };
    createStart={x,y}; createMoved=false;
    setFoot('離すと確定（利確+14% / 損切-7%。後で端をドラッグして調整できます）');
    redrawOverlay(); return;
  }
  if(tool==='poly'){
    // 折線: タップするたびに点を追加。確定はツールボタンをもう一度押す
    pendingPoly=pendingPoly||[];
    pendingPoly.push({t, p:price});
    setFoot('点 '+pendingPoly.length+'個。「〰 折線」をもう一度押すと確定');
    redrawOverlay(); return;
  }
  if(pendingPoint){
    // 2点目：1点目とつないでプレビュー（動かして微調整→離して確定）
    creating={ id:0, type:tool, color:drawColor, a:pendingPoint, b:{t,p:price} };
    pendingPoint=null; createStart={x,y}; createMoved=true;
    setFoot(statsText(creating.a, creating.b));
    redrawOverlay(); return;
  }
  // 1点目：押したまま引っぱればそのまま描ける。すぐ離せばタップ2回方式
  creating={ id:0, type:tool, color:drawColor, a:{t,p:price}, b:{t,p:price} };
  createStart={x,y}; createMoved=false;
  redrawOverlay();
});

// 引っぱっている間：プレビューを更新し、下のバーに数値をリアルタイム表示
window.addEventListener('pointermove', e=>{
  if(!creating) return;
  const {x,y}=chartXY(e);
  if(createStart && Math.hypot(x-createStart.x, y-createStart.y)>10) createMoved=true;
  if(creating.type==='hline'){
    const pr=yToP(y); if(pr!=null){ creating.price=pr; setFoot('価格 '+pr.toFixed(2)+'（離すと確定）'); }
  } else if(creating.type==='arrow' || creating.type==='pos'){
    const t2=xToTs(x), pr=yToP(y);
    if(t2!=null&&pr!=null){
      creating.a={t:t2, p:pr};
      if(creating.type==='pos'){ creating.target=+(pr*1.14).toFixed(4); creating.stop=+(pr*0.93).toFixed(4); }
    }
  } else {
    const t=xToTs(x), pr=yToP(y);
    if(t!=null&&pr!=null){ creating.b={t,p:pr}; setFoot(statsText(creating.a, creating.b)); }
  }
  layoutOverlay();   // 位置だけ更新（作り直さない）
});

// 離した瞬間：確定（ほぼ動かしていなければ「タップ2回」の1点目として待つ）
window.addEventListener('pointerup', ()=>{
  if(!creating) return;
  const c=creating; creating=null; createStart=null;
  if(c.type==='hline' || c.type==='arrow' || c.type==='pos'){
    c.id=uid++; drawings.push(c); saveDrawings();
    setFoot(c.type==='hline' ? '水平線を追加（掴んで上下に動かせます）'
          : c.type==='arrow' ? '矢印を追加（掴んで動かせます）'
          : '損益ツールを追加（緑=利確 / 赤=損切。端をドラッグで調整）');
    setTool(null); redrawOverlay(); return;
  }
  if(!createMoved){
    pendingPoint=c.a;   // 1点目として記憶（目印の丸が出る）
    setFoot('もう1点タップ（引っぱってもOK）');
    redrawOverlay(); return;
  }
  if(c.a.t===c.b.t){ setFoot('もう少し横まで引っぱってください'); redrawOverlay(); return; }
  c.id=uid++; drawings.push(c); saveDrawings();
  setFoot((c.type==='rect'?'計測ボックス': c.type==='vp'?'価格帯別出来高':'トレンドライン')+'を追加（掴んで動かせます）');
  setTool(null); redrawOverlay();
});

// ---- 既存の線/枠を「掴んで動かす」操作（こちらは対象が小さいので従来通り） ----
// Safariの一部バージョンはSVG要素の setPointerCapture が不安定なため、
// 失敗しても止まらないように try/catch で囲む
function tryCapture(e){ try{ svg.setPointerCapture(e.pointerId); }catch(err){ /* 失敗しても続行 */ } }

svg.addEventListener('pointerdown', e=>{
  const t=e.target, id=t.getAttribute&&t.getAttribute('data-id'), role=t.getAttribute&&t.getAttribute('data-role');
  if(!id) return; // 既存の図形の上以外は、チャート自身の操作(パン等)に譲る
  const d=drawings.find(x=>x.id===+id); if(!d) return;
  selected=d.id; showDelBtn();
  // 太さは変えず、下のバーの文字で「選択中」を知らせる
  const names={hline:'水平線', rect:'計測ボックス', trend:'トレンドライン', arrow:'矢印', poly:'折線', pos:'損益ツール', vp:'価格帯別出来高'};
  setFoot((d.type==='hline' ? '水平線 '+d.price.toFixed(2) : names[d.type]||'図形')
    + ' を選択中（「線の設定」「選択を削除」が使えます）');
  drag={ d, role, vi:+(t.getAttribute('data-vi')||-1),   // 折線のどの頂点を掴んだか
         start:pos(e), orig:JSON.parse(JSON.stringify(d)),
         la: d.a?tsToLogical(d.a.t):null, lb: d.b?tsToLogical(d.b.t):null,
         lpts: d.pts ? d.pts.map(pt=>tsToLogical(pt.t)) : null }; // 全体移動用に、今の位置（何本目か・小数）を控えておく
  tryCapture(e); e.preventDefault();
});
// 線に指が触れた瞬間に「これはスクロールではない」とiPhoneに宣言する。
// これが無いと、上下ドラッグ(特に水平線)をiPhoneがスクロールと誤解して
// ドラッグを途中で強制キャンセルし、画面ごと動いてしまう
svg.addEventListener('touchstart', e=>{
  const t=e.target;
  if(t && t.getAttribute && t.getAttribute('data-id')) e.preventDefault();
}, {passive:false});
// move/upは svg ではなく window で監視する
// → setPointerCapture が失敗しても、指がどこに動いてもドラッグを追跡できる
window.addEventListener('pointermove', e=>{
  if(!drag) return;
  const p=pos(e);
  const d=drag.d, o=drag.orig;
  if(d.type==='hline'){ const pr=yToP(p.y); if(pr!=null) d.price=pr; }
  else if(d.type==='arrow'){ // 矢印: そのまま移動
    const t=xToTs(p.x), pr=yToP(p.y); if(t!=null&&pr!=null) d.a={t, p:pr};
  }
  else if(d.type==='poly'){ // 折線: 頂点を1つ動かす or 全体を平行移動
    if(drag.role==='v' && drag.vi>=0){
      const t=xToTs(p.x), pr=yToP(p.y); if(t!=null&&pr!=null) d.pts[drag.vi]={t, p:pr};
    } else {
      const l1=xToL(drag.start.x), l2=xToL(p.x), dp=yToP(p.y)-yToP(drag.start.y);
      if(l1!=null&&l2!=null&&!isNaN(dp)&&drag.lpts){
        const dl=l2-l1;
        d.pts=drag.orig.pts.map((pt,k)=>{
          const ts=logicalToTs(drag.lpts[k]+dl);
          return ts==null ? pt : {t:Math.round(ts), p:pt.p+dp};
        });
      }
    }
  }
  else if(d.type==='pos'){ // 損益ツール: 緑端=利確 / 赤端=損切 / エントリー線=全体移動
    if(drag.role==='a'){ const pr=yToP(p.y); if(pr!=null) d.target=pr; }
    else if(drag.role==='b'){ const pr=yToP(p.y); if(pr!=null) d.stop=pr; }
    else {
      const l1=xToL(drag.start.x), l2=xToL(p.x), dp=yToP(p.y)-yToP(drag.start.y);
      if(l1!=null&&l2!=null&&!isNaN(dp)&&drag.la!=null){
        const ts=logicalToTs(drag.la+(l2-l1));
        if(ts!=null){ d.a={t:Math.round(ts), p:drag.orig.a.p+dp}; d.target=drag.orig.target+dp; d.stop=drag.orig.stop+dp; }
      }
    }
  }
  else if(drag.role==='a'){ const t=xToTs(p.x), pr=yToP(p.y); if(t!=null&&pr!=null) d.a={t, p:pr}; }
  else if(drag.role==='b'){ const t=xToTs(p.x), pr=yToP(p.y); if(t!=null&&pr!=null) d.b={t, p:pr}; }
  else { // body：全体を平行移動（小数単位でなめらかに動く）
    const l1=xToL(drag.start.x), l2=xToL(p.x);
    const dp=yToP(p.y)-yToP(drag.start.y);
    if(l1==null||l2==null||isNaN(dp)||drag.la==null||drag.lb==null) return;
    const dl=l2-l1;   // 何本ぶん動いたか（小数のまま）
    const ta=logicalToTs(drag.la+dl), tb=logicalToTs(drag.lb+dl);
    if(ta==null||tb==null) return;
    d.a={t:Math.round(ta), p:o.a.p+dp};
    d.b={t:Math.round(tb), p:o.b.p+dp};
  }
  layoutOverlay();   // 位置だけ更新（作り直さない）
});
function endPointer(){ if(drag) saveDrawings(); drag=null; }  // 動かし終わったら保存
window.addEventListener('pointerup', endPointer);

// ツール選択 / 色 / 消去
function setTool(t){
  commitPoly();   // 折線を作成中なら、ツールを離れる前に確定する
  tool=t; pendingPoint=null; creating=null; createStart=null;
  document.querySelectorAll('#toolbar button[data-tool]').forEach(x=>x.classList.toggle('active', x.dataset.tool===t));
  $('catcher').style.display = t ? 'block' : 'none';   // ツール中だけ受け皿を出す
  const hints={
    hline:'水平線：置きたい所を押す（押したまま上下で微調整）',
    trend:'引っぱって描く（タップ2回でもOK）',
    rect:'引っぱって囲む（タップ2回でもOK）',
    au:'矢印を置きたい所をタップ（押したままズラして微調整もOK）',
    ad:'矢印を置きたい所をタップ（押したままズラして微調整もOK）',
    poly:'タップで点を追加 → ボタンをもう一度押すと確定',
    pos:'エントリー価格の所をタップ（利確+14% / 損切-7%で作成。後で端をドラッグして調整）',
    vp:'調べたい期間を引っぱって囲む（タップ2回でもOK）',
  };
  if(t) setFoot(hints[t]||'');
  else setFoot('ツールを解除しました');
}
// 折線を確定する（点が2個以上たまっていたら1本の折線として保存）
function commitPoly(){
  if(pendingPoly && pendingPoly.length>=2){
    drawings.push({ id:uid++, type:'poly', color:drawColor, pts:pendingPoly });
    saveDrawings();
    setFoot('折線を追加（点を掴んで動かせます）');
  }
  pendingPoly=null;
  redrawOverlay();
}
function clearDrawings(){ drawings=[]; drag=null; pendingPoint=null; pendingPoly=null; creating=null; createStart=null; selected=null; hideDelBtn(); saveDrawings(); redrawOverlay(); }

/* 「線の設定」…選択中の線の色・太さ・線種を変える */
function openDrawingStyle(){
  const d=drawings.find(x=>x.id===selected); if(!d) return;
  $('dsColor').value = d.color || '#f5c518';
  $('dsWidth').value = String(Math.min(4, Math.max(1, Math.round(d.width || 2))));

$('dsCancel').addEventListener('click', ()=>$('dsBack').classList.remove('open'));
$('dsOk').addEventListener('click', ()=>{

$('toolbar').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;

  if(b.id==='clearBtn'){ clearDrawings(); setFoot('この銘柄の描画を消去しました'); return; }

    drawings=drawings.filter(x=>x.id!==selected);

// パン・ズームしたら重ねレイヤーも追従させる
/* 描画シートをチャートと同じタイミングで動かす（ズーム時の遅れ対策）
   「表示範囲が変わったよ」という連絡を待つと半歩遅れるので、
   画面の更新ごと(毎フレーム)に「表示範囲が変わったか」を自分で確かめて、
   変わった時だけ位置を計算し直す。変わっていなければ何もしない（省エネ） */
let lastSyncKey='';
function viewKey(){
  const r=TS().getVisibleLogicalRange();
  const w=$('chart').clientWidth, h=$('chart').clientHeight;
  const py=lastCandle ? Py(lastCandle.close) : 0;   // 縦方向(価格の縮尺)の変化も拾う
  return (r ? r.from+','+r.to : '-')+','+w+','+h+','+py;
}
(function syncLoop(){
  if(drawings.length || creating || pendingPoint){
    const k=viewKey();
    if(k!==lastSyncKey){ lastSyncKey=k; layoutOverlay(); }
  }
  requestAnimationFrame(syncLoop);
})();

/* =========================================================
   ⑥ ウォッチリスト（複数リスト対応）
   ========================================================= */
function priceOf(ticker){
  // 実データがあればそれ、無ければサンプルの日足から最新値と前日比
  const d = realCache[ticker+'@1d'] || sampleDataset(ticker,'1d');
  const c=d.candles, last=c[c.length-1], prev=c[c.length-2];
  return { price:last.close, chg:(last.close-prev.close)/prev.close*100 };
}

/* リスト切り替えタブ（＋新規 / ✎名前変更 / 🗑削除） */
function renderTabs(){
  const tabs=$('listTabs'); tabs.innerHTML='';
  lists.forEach(L=>{
    const c=document.createElement('button');
    c.className='chip'+(L.id===activeListId?' active':'');
    c.textContent=L.name;
    c.addEventListener('click',()=>{
      activeListId=L.id; store.set('mychart-active-list',activeListId);
      renderTabs(); renderList();
    });
    tabs.appendChild(c);
  });
  // ＋ 新しいリストを作る
  const add=document.createElement('button'); add.className='chip mini'; add.textContent='＋';
  add.addEventListener('click',()=>{
    askText('新しいリストの名前（例: バイオ、半導体）','',name=>{
      if(!name||!name.trim()) return;
      const L={ id:Date.now(), name:name.trim(), tickers:[] };
      lists.push(L); activeListId=L.id;
      saveLists(); store.set('mychart-active-list',activeListId);
      renderTabs(); renderList();
    });
  });
  tabs.appendChild(add);
  // ✎ いま開いているリストの名前を変える
  const ren=document.createElement('button'); ren.className='chip mini'; ren.textContent='✎';
  ren.addEventListener('click',()=>{
    const L=activeList();
    askText('リスト名を変更', L.name, name=>{
      if(!name||!name.trim()) return;
      L.name=name.trim(); saveLists(); renderTabs();
    });
  });
  tabs.appendChild(ren);
  // 🗑 いま開いているリストを削除（1回目のタップで確認、もう一度タップで実行）
  if(lists.length>1){
    const del=document.createElement('button'); del.className='chip mini'; del.textContent='🗑';
    let armed=false;
    del.addEventListener('click',()=>{
      if(!armed){
        armed=true; del.textContent='削除する？'; del.style.color='#ef5350';
        setTimeout(()=>{ armed=false; if(del.isConnected){ del.textContent='🗑'; del.style.color=''; } }, 3000);
        return;
      }
      const L=activeList();
      lists=lists.filter(x=>x.id!==L.id); activeListId=lists[0].id;
      saveLists(); store.set('mychart-active-list',activeListId);
      renderTabs(); renderList();
    });
    tabs.appendChild(del);
  }
}

function renderList(){
  const list=$('list'); list.innerHTML='';
  const tickers=activeList().tickers;
  if(!tickers.length){ list.appendChild(label('「＋追加」で銘柄を入れてください')); return; }
  const fav=tickers.filter(t=>isFav(t)), oth=tickers.filter(t=>!isFav(t));
  if(fav.length) list.appendChild(label('★ お気に入り'));
  fav.forEach(t=>list.appendChild(rowEl(symInfo(t))));
  if(fav.length) list.appendChild(label('リストの銘柄'));
  oth.forEach(t=>list.appendChild(rowEl(symInfo(t))));
}
function label(t){ const d=document.createElement('div'); d.className='sec-label'; d.textContent=t; return d; }
function rowEl(s){
  const {price,chg}=priceOf(s.ticker);
  const row=document.createElement('div'); row.className='row'+(s.ticker===current.ticker?' active':'');
  row.innerHTML=`
    <div class="star ${isFav(s.ticker)?'on':''}" data-star="${s.ticker}">${isFav(s.ticker)?'★':'☆'}</div>
    <div><div class="tk">${s.ticker}</div><div class="nm">${s.name}</div></div>
    <div class="rt mono"><div class="price">${price.toFixed(2)}</div>
      <div class="chg ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(2)}%</div></div>
    <div class="del" data-del="${s.ticker}">×</div>`;
  row.addEventListener('click',e=>{
    if(e.target.dataset.star){ toggleFav(s.ticker); return; }      // ☆をタップ→お気に入り
    if(e.target.dataset.del){ removeSymbol(s.ticker); return; }    // ×をタップ→このリストから外す
    if(symbolTarget===2){ c2.ticker=s.ticker; render2(); closeDrawer(); return; }
    current.ticker=s.ticker; render(); renderList(); closeDrawer();
  });
  return row;
}
function toggleFav(t){ favs=isFav(t)?favs.filter(x=>x!==t):[...favs,t]; store.set('mychart-favs',favs);
  renderList(); $('hdrFav').style.display=isFav(current.ticker)?'inline':'none'; }

/* --- ティッカー検索（TradingViewの検索窓のような機能） --- */
// 入力を大文字だけに整える（AAPL, BRK.B などを許可）
function cleanTicker(v){ return (v||'').trim().toUpperCase().replace(/[^A-Z0-9.\-]/g,''); }
// カンマ区切りの入力を「銘柄の一覧」に分解する
// 例: "AAPL, NVDA，SOXX" → ["AAPL","NVDA","SOXX"]
// 半角カンマ・全角カンマ・読点・空白のどれで区切ってもOK。重複は自動で除く
function parseTickers(v){
  return (v||'').split(/[,、，\s]+/)
    .map(cleanTicker)
    .filter((t,i,arr)=> t && arr.indexOf(t)===i);
}
// 打った銘柄を表示するだけ（複数打った場合は最初の1つを表示）
function showTicker(v){
  const t=parseTickers(v)[0]; if(!t) return;
  if(symbolTarget===2){ c2.ticker=t; render2(); closeDrawer(); return; }
  current.ticker=t; render(); renderList(); closeDrawer();
}
// 打った銘柄を、いま開いているリストに保存して表示
// カンマ区切りならまとめて追加できる（TradingView風）
function addSymbol(v){
  const ts=parseTickers(v); if(!ts.length) return;
  const L=activeList();
  const added=[];
  ts.forEach(t=>{ if(!L.tickers.includes(t)){ L.tickers.push(t); added.push(t); } });
  if(added.length) saveLists();
  showTicker(ts[0]);   // 最初の銘柄をチャートに表示
  setFoot(added.length
    ? added.length+'銘柄を追加: '+added.join(', ')
    : 'すべて追加済みでした');
}
// いま開いているリストから銘柄を外す
function removeSymbol(t){
  const L=activeList();
  L.tickers=L.tickers.filter(x=>x!==t); saveLists();
  renderList();
}

let symbolTarget=1;   // ウォッチリストで選んだ銘柄を、どちらの画面に反映するか（1=メイン 2=2画面目）

   1画面 → 上下2画面 → 左右2画面 の順にボタンで切り替え。
   2画面目は「比較用」で、ローソク足＋出来高を表示する。

   ========================================================= */
let layoutMode = store.get('mychart-layout', '1');    // '1'=1画面 'v'=上下 'h'=左右

// 2画面目のチャートを（初めて必要になった時に）作る
function ensureChart2(){
  if(chart2) return;
  chart2=LightweightCharts.createChart($('chart2'),{
    layout:{background:{color:'#0e1117'},textColor:'#d1d4dc'},
    grid:{vertLines:{color:'#1b212c'},horzLines:{color:'#1b212c'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'#232a36'}, timeScale:{borderColor:'#232a36'},
  });
  candle2=chart2.addSeries(LightweightCharts.CandlestickSeries,{
    upColor:'#26a69a',downColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350',borderVisible:false});
  candle2.priceScale().applyOptions({scaleMargins:{top:0.08,bottom:0.25}});
  volume2=chart2.addSeries(LightweightCharts.HistogramSeries,{priceFormat:{type:'volume'},priceScaleId:''});
  volume2.priceScale().applyOptions({scaleMargins:{top:0.8,bottom:0}});
  new ResizeObserver(()=>{ const el=$('chart2'); chart2.resize(el.clientWidth, el.clientHeight); }).observe($('chart2'));

// 2画面目を描画（実データ→ダメならサンプル。時間足はメインと共通）
async function render2(){
  if(layoutMode==='1' || !chart2) return;
  $('c2sym').textContent=c2.ticker+' ▾';
  store.set('mychart-c2', c2.ticker);
  const cacheKey=c2.ticker+'@'+current.step;
  let d=realCache[cacheKey];
  if(!d && store.get('td-key','')){
    try{ d=pack(await fetchReal(c2.ticker, current.step)); realCache[cacheKey]=d; }catch(e){}
  }
  if(!d) d=sampleDataset(c2.ticker, current.step);
  candle2.setData(d.candles); volume2.setData(d.vols);
  chart2.applyOptions({ timeScale:{ timeVisible: current.step==='65m', secondsVisible:false } });
  const n2=d.candles.length;
  if(n2>320) chart2.timeScale().setVisibleLogicalRange({from:n2-250, to:n2+3});
  else chart2.timeScale().fitContent();
  const last=d.candles[d.candles.length-1], prev=d.candles[d.candles.length-2];
  const chg=(last.close-prev.close)/prev.close*100;
  $('c2price').textContent=last.close.toFixed(2)+' ('+(chg>=0?'+':'')+chg.toFixed(2)+'%)';
}

/* =========================================================
   スワイプで銘柄切替（TradingView風）
   ヘッダー/数値の行=メイン画面、2画面目の銘柄バー=2画面目 が切り替わる
   ========================================================= */
let suppressClickUntil=0;   // スワイプ直後の「タップ誤発動」を防ぐ

function stepSymbol(dir, target){
  const list=activeList().tickers;
  if(!list.length){ setFoot('ウォッチリストが空です（＋追加で銘柄を入れてください）'); return; }
  const cur=(target===2) ? c2.ticker : current.ticker;
  let i=list.indexOf(cur);
  // リストに無い銘柄からのスワイプは端から始める
  i = (i<0) ? (dir>0 ? 0 : list.length-1) : (i+dir+list.length)%list.length;
  if(target===2){ c2.ticker=list[i]; render2(); }
  else { current.ticker=list[i]; render(); }
  setFoot(list[i]+'（'+(i+1)+'/'+list.length+'・'+activeList().name+(target===2?'・2画面目':'')+'）');
}
function swipeTarget(el, target){
  if(!el) return;
  let sx=0, sy=0, t0=0, tracking=false;
  el.addEventListener('pointerdown', e=>{ sx=e.clientX; sy=e.clientY; t0=Date.now(); tracking=true; });
  window.addEventListener('pointerup', e=>{
    if(!tracking) return; tracking=false;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)>60 && Math.abs(dy)<50 && Date.now()-t0<600){
      suppressClickUntil=Date.now()+400;      // 直後のタップ扱いを無効化
      stepSymbol(dx<0 ? 1 : -1, target);
    }
  });
}
swipeTarget(document.querySelector('header'), 1);
swipeTarget(document.querySelector('.legend'), 1);
swipeTarget($('c2bar'), 2);

// 2画面目の銘柄名をタップ → ウォッチリストから選ぶ（選択先=2画面目）
$('c2bar').addEventListener('click', ()=>{
  if(Date.now()<suppressClickUntil) return;
  openDrawer(2);
});

render();
setLayout(layoutMode);   // 前回のレイアウト（1画面/上下/左右）を復元
if(store.get('mychart-max', false)) setMax(true);   // 前回「最大化」なら復元
} // main() ここまで

// 部品が用意できたら起動（プレビューで読み込めない時は案内を表示）
whenReady(main);
</script>
